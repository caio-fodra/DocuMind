services:
  - type: web
    name: documind
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DOCUMIND_TOP_K
        value: "3"
      - key: DOCUMIND_RELEVANCE_THRESHOLD
        value: "0.1"
      - key: DOCUMIND_AUTO_SEED
        value: "true"